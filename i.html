	body {
    font-family: 'Arial', sans-serif;
    background-color: #f9f9f9;
}

.contact-container {
    max-width: 1100px;
    margin: 50px auto;
    padding: 20px;
}

.contact-content {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
}

.contact-text {
    flex: 1;
    min-width: 300px;
}

.sub-title {
    color: #004a99;
    font-weight: bold;
    text-decoration: underline;
    font-size: 14px;
	
}

.contact-text h1 {
    font-size: 42px;
    line-height: 1.1;
    margin: 20px 0;
    color: #222;
}

.contact-text p {
    color: #666;
    line-height: 1.6;
    margin-bottom: 30px;
}

/* Sosyal Medya İkonları */
.social-icons a {
    color: #333;
    margin-right: 15px;
    font-size: 18px;
    text-decoration: none;
}

/* Form Alanları */
.contact-form {
    flex: 1.2;
}

.form-row {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
}

.form-row input, .form-row textarea {
    width: 100%;
    padding: 15px;
    border: none;
    background-color: #f1f1f1;
    font-size: 16px;
    outline: none;
}

.form-row textarea {
    resize: none;
}

/* Gönder Butonu */
.send-btn {
    background-color: #004a99;
    color: white;
    border: none;
    padding: 15px 40px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s;
    text-transform: uppercase;
}

.send-btn:hover {
    background-color: #003366;
}

/* Mobil Uyumluluk */
@media (max-width: 768px) {
    .form-row {
        flex-direction: column;
    }
}

	
</style>
