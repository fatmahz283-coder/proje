<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Untitled Document</title>
<link rel="stylesheet" href="a.css"/>
<script>
function tikla()
{
	alert("Rezervasyonunuz Başarıyla Tamamlanmıştır");
	}
</script>
<style>
/*rezervasyon kodu */
.booking-container {
    max-width: 480px;
    margin: 30px auto;
    padding:30px;
    background: #f9f9f9;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    font-family: 'Segoe UI', sans-serif;
	
}
h2 { text-align: center; color: #333; margin-bottom:20px; }

.input-group { margin-bottom:15px; }

label{ 
   display: block; 
   margin-bottom:5px; 
   font-weight:600;
   color:#555; 
 }
input, select {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    box-sizing: border-box; /* Padding'in genişliği bozmasını engeller */
}
.row {
    display: flex;
    gap: 15px; /* Aradaki boşluk */
}
.btn-submit {
    width: 100%;
    padding: 15px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
}
.btn-submit:hover { background-color: #0056b3; }

/*menu kodu */
ul{
	margin:0px;
	padding:0px;
	background-color:#000;
	list-style-type:none;
	width:100%;
	height:70px;
	margin-bottom:0px;
	}
li{
	float:left;
	}
li a{
	color:white;
	text-align:center;
	font-size:18px;
	padding:22px 40px;
	text-decoration:none;
	display:block;
	font-size:24px;
	min-width:130px;
	}
li a:hover{
	background-color:#999;
	transition: 0.3s;     /* Üzerine gelince yumuşak efekt için */
	}	
#kutu{
	width:99%;
	height:520px;
	top:95px;
	position:absolute;}	
#kutu1{
	top:160px;
	position:relative;}
</style>
</head>

<body>

<ul>
<li><a href="anasayfa.html">Luvia Restaurant & Lounge</a></li>
<li><a href="Rezervasyon.html">Rezervasyon</a></li>
<li><a href="galeri.html">Galeri</a></li>
<li><a href="hakkimizda.html">Hakkımızda</a></li>
<li><a href="i.html">İletişim</a></li>
</ul>

<div id="center">
<img src="resim/hakimizda.png"  id="kutu"/>
<div id="kutu1">
<div class="booking-container">
    <h2>Rezervasyon Yapın</h2>
    <form action="/kaydet" method="POST">
        <div class="input-group">
            <label for="name">Ad Soyad</label>
            <input type="text" id="name" name="name" placeholder="Adınız" required>
        </div>
        <div class="input-group">
            <label for="email">E-posta</label>
            <input type="email" id="email" name="email" placeholder="ornek@mail.com" required>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="date">Tarih</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="input-group">
                <label for="guests">Kişi Sayısı</label>
                <select id="guests" name="guests">
                    <option value="1">1 Kişi</option>
                    <option value="2">2 Kişi</option>
                    <option value="3">3 Kişi</option>
                    <option value="4+">4+ Kişi</option>
                </select>
            </div>
        </div>
        <button type="submit" onclick="tikla()" class="btn-submit">Hemen Ayırt</button>
    </form>
</div>
</div>
</div>

</body>
</html>
